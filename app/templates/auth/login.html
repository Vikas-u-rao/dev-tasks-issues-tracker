{% extends 'base.html' %}

{% block title %}Login - DEVTRACKER{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="glass-card mt-5">
            <h2 class="text-center mb-4 font-bold">Welcome Back</h2>
            <p class="text-secondary text-center mb-4">Please enter your credentials to access your dashboard.</p>
            
            <form method="POST">
                <div class="mb-3">
                    <label for="username" class="form-label text-secondary">Username</label>
                    <input type="text" class="form-control" id="username" name="username" required autocomplete="username">
                </div>
                
                <div class="mb-4">
                    <label for="password" class="form-label text-secondary">Password</label>
                    <input type="password" class="form-control" id="password" name="password" required autocomplete="current-password">
                </div>
                
                <button type="submit" class="btn btn-primary w-100 py-2.5">Login</button>
            </form>
            
            <hr class="my-4 border-secondary opacity-25">
            
            <p class="text-center text-secondary mb-0">
                Don't have an account? <a href="{{ url_for('auth.register') }}" class="text-primary-accent text-decoration-none" style="color: var(--primary-accent);">Register here</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
